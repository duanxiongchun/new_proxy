# ==============================================================================
# HYBRID SECURE PROXY GATEWAY - 配置文件模板 (proxy.conf)
# ==============================================================================
# 
# 本文件包含了网关所有的可选和必选配置参数，并对各个字段进行了详细的中文说明。
# 网关接口的默认名称将根据本配置文件的文件名自动获取（例如本文件名为 proxy.conf，
# 网关的逻辑接口基准名即为 proxy，派生的接口设备名为 proxy-tun / proxy-veth / proxy-wg）。

[Interface]
# ------------------------------------------------------------------------------
# 接口基础配置
# ------------------------------------------------------------------------------

# 网关私钥 (必选)
# 类型: Base64 编码的 32 字节私钥
# 作用: 网关进行 X25519 ECDH 对等密钥交换和身份认证时的本地私钥材料，格式同 WireGuard。
PrivateKey = <local_private_key_base64>

# 隧道逻辑 IP 地址列表 (必选)
# 类型: 逗号分隔的 IPv4/IPv6 CIDR 地址段
# 作用: 绑定到隧道网卡设备上的 IP 地址（支持双栈）。
# 示例: Address = 10.0.0.1/24, fd00::1/64
Address = 10.0.0.1/24

# QUIC 控制面本地监听端口 (可选)
# 类型: 16位无符号整数 (1..65535)
# 作用: 客户端与服务端之间发起 QUIC 物理链路控制连接时的本地监听端口（仅在作为服务端时必选）。
# 默认值: 如果不指定，则仅作为主动连接客户端使用。
ListenPort = 51820

# WireGuard 本地监听端口 (可选)
# 类型: 16位无符号整数 (1..65535)
# 作用: 当配置了 wireguard 类型 peer 时，本地内核态/用户态 WireGuard 隧道的监听端口。
# 默认值: 若未指定，则默认为 ListenPort + 1 (即 51821)；若 ListenPort 也未指定，则默认为 51821。
WgListenPort = 51822

# QUIC 协商控制面监听端口 (可选)
# 类型: 16位无符号整数 (1..65535)
# 作用: 服务端用于接收客户端发起的预协商请求（协商动态 QUIC 物理连接端口池、交换证书 SHA-256 指纹等）。
# 注意: 本地 CLI 与 daemon 网关的遥测与管理通信（如 new-proxy-cli）完全基于 Unix Domain Socket (UDS) 路径，不占用任何 TCP/UDP 端口。
# 默认值: 若未指定，则默认使用 ListenPort 的端口。
ListenControlPort = 51821

# 网卡最大传输单元 MTU (可选)
# 类型: 16位无符号整数 (576..65535)
# 作用: 指定虚拟 TUN / veth 设备以及 WireGuard 设备的最大传输单元。网关会自动根据该值
#       对经过隧道的 TCP 流量进行 MSS 夹紧（MSS Clamping）以防分片。
# 默认值: 1280
MTU = 1420

# 自动路由表管理开关 (可选)
# 类型: 字符串 (auto / off)
# 作用:
#   - auto: 网关启动时自动创建网卡、绑定 IP 并根据 Peer 配置的 AllowedIPs 自动添加主机路由，
#           并在退出时自动回滚所有路由、网卡及规则（推荐）。
#   - off: 禁用自动路由管理，网关仅初始化隧道，所有网卡绑定和路由配置由外部脚本或工具手动完成。
# 默认值: auto
Table = auto

# 物理数据面后端模式 (可选)
# 类型: 字符串 (tun / af_xdp)
# 作用:
#   - tun: 默认模式。创建标准 Linux 多队列 TUN 虚拟网卡设备，数据包经由内核路由截获，网关在用户态异步读写 TUN FD 进行处理。兼容性好，支持各种通用虚拟/物理网卡和双栈网络。
#   - af_xdp: 高性能内核旁路模式。使用 eBPF 过滤程序在网卡驱动层直接将目标流量拦截并重定向到用户态共享内存环（UMEM），提供零拷贝、低 CPU 损耗的极限转发性能。
# 默认值: tun
Mode = tun

# 启动前置脚本 (可选)
# 类型: 字符串 (单行 shell 命令，或可执行脚本路径)
# 作用: 在网关初始化之前执行的命令，通常用于配置系统转发（如 `sysctl -w net.ipv4.ip_forward=1`）。
PreScript = sysctl -w net.ipv4.ip_forward=1

# 退出后置脚本 (可选)
# 类型: 字符串 (单行 shell 命令，或可执行脚本路径)
# 作用: 在网关优雅退出、清理完所有路由和虚拟设备后执行的命令。
PostScript = echo "Gateway stopped cleanly."


[QUICPool]
# ------------------------------------------------------------------------------
# QUIC 连接池配置 (当作为服务端/代理中转端且含有 quic 类型 peer 时必须配置)
# ------------------------------------------------------------------------------

# 公网 IPv4 地址 (可选)
# 类型: IPv4 地址字符串
# 作用: 宣告本端的公网可达 IPv4 地址，通知客户端进行 QUIC Pool 对等多端口连接。
PublicIPv4 = 1.2.3.4

# 公网 IPv6 地址 (可选)
# 类型: IPv6 地址字符串
# 作用: 宣告本端的公网可达 IPv6 地址。
PublicIPv6 = 2001:db8::1

# QUIC 连接池监听端口列表 (必选)
# 类型: 逗号分隔的端口列表 (16位无符号整数)
# 作用: 用于接收 QUIC Datagram 数据物理流的 UDP 端口池。通过多端口连接池与网卡多队列对称绑定，
#       可以打满多核 CPU 并且避免内核物理网卡 RSS 接收侧扩展的单流哈希瓶颈。
# 示例: ListenPorts = 40001, 40002, 40003, 40004
ListenPorts = 40001, 40002


[XDP]
# ------------------------------------------------------------------------------
# AF_XDP 极速物理数据面配置 (仅在 Mode = af_xdp 时有效)
# ------------------------------------------------------------------------------

# 外层物理/虚拟网卡接口名 (必选)
# 类型: 字符串 (如 eth0)
# 作用: 指定运行外层 QUIC 加密物理连接的物理/虚拟网卡设备名称。
QuicInterface = eth0

# 本地流量拦截网卡列表 (可选)
# 类型: 逗号分隔的接口列表
# 作用: 网关将自动在这些网卡上挂载 eBPF 过滤程序，用以捕获目的地为 AllowedIPs 且需送入隧道加密的本地业务流量。
# 默认值: 若不配置，默认使用自动生成的 veth 网口设备（名称为 `<interface_name>-veth`），由网关在内部直接在此虚拟接口上挂载拦截。
InterceptInterfaces = eth0, lo

# eBPF 程序加载模式 (可选)
# 类型: 字符串 (native / skb / driver)
# 作用:
#   - native: 驱动级 XDP。性能最好，需网卡驱动支持。
#   - skb: 通用 Generic XDP。适用于任何网卡和虚拟化测试环境（如 veth）。
# 默认值: native
XdpMode = native


[Peer]
# ------------------------------------------------------------------------------
# 对等体配置 (可以定义多个 [Peer] 段以连接多个节点)
# ------------------------------------------------------------------------------

# 对等体公钥 (必选)
# 类型: Base64 编码的 32 字节公钥
# 作用: 标识对等体身份的 X25519 公钥材料。
PublicKey = <peer_public_key_base64>

# 隧道路由流量网段 (必选)
# 类型: 逗号分隔的 IPv4/IPv6 CIDR 地址段
# 作用: 指定该 Peer 负责接收并转发的 IP 目的地段（类似于 WireGuard 的 AllowedIPs）。
AllowedIPs = 10.0.0.2/32

# 对等体端点公网地址 (可选)
# 类型: SocketAddr 格式 (IP:Port)
# 作用: 主动向对等体发起连接时的公网 Endpoint。当作为客户端连接服务端时必须配置。
Endpoint = 1.2.3.4:51820

# 客户端代理控制端口 (可选)
# 类型: 16位无符号整数
# 作用: 指定连接服务端时的控制面 QUIC 端口（若不填则默认使用 Endpoint 中的端口）。
ProxyPort = 51821

# 对等体隧道协议类型 (可选)
# 类型: 字符串 (quic / wireguard)
# 作用:
#   - quic: 流量经由本地 userspace TUN/veth 接口进入 IP-over-QUIC 隧道封装发送。
#   - wireguard: 流量经由本地内核态 WireGuard 网卡发送（若内核无该模块则自动退化为用户态 wireguard-go 转发）。
# 默认值: quic
Type = quic
