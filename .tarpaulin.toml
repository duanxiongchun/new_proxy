[default]
engine = "Llvm"
out = ["Lcov", "Xml"]
output-dir = "."

# Unit coverage focuses on deterministic pure logic. The excluded files are
# binary entrypoints, CLI/socket adapters, QUIC/TUN/TCP I/O adapters, and long
# runtime loops that are covered by acceptance/E2E scripts instead.
exclude-files = [
    "src/cli.rs",
    "src/main.rs",
    "src/client.rs",
    "src/quic_pool.rs",
    "src/rtc_loop.rs",
    "src/uds_server.rs",
    "src/tun_device.rs",
    "src/tun_io.rs",
    "src/stats_cli.rs",
    "src/control.rs",
]
